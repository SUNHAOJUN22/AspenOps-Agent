name: Materialize verified v1 release

on:
  issues:
    types: [opened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name != 'issues' || github.event.issue.title == 'MATERIALIZE_ASPENOPS_V1'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout bootstrap branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reconstruct and validate release bundle
        shell: bash
        run: |
          set -euo pipefail
          test "$(find bootstrap -maxdepth 1 -name 'part-*.b64' | wc -l)" -eq 9
          cat $(find bootstrap -maxdepth 1 -name 'part-*.b64' | sort) | base64 --decode > /tmp/aspenops-v1.bundle
          echo "a67b37001c657e1f9b6b9b80f297684e7be026ff4eb4a472c2eef9fec4370b4a  /tmp/aspenops-v1.bundle" | sha256sum --check --strict
          git bundle verify /tmp/aspenops-v1.bundle
          git fetch /tmp/aspenops-v1.bundle refs/heads/main:refs/remotes/release/main refs/tags/v1.0.0:refs/tags/v1.0.0
          test "$(git rev-parse refs/remotes/release/main)" = "b2bfd35c8672c6238e7ab488c99c3483b9f342b0"
          test "$(git rev-parse 'refs/tags/v1.0.0^{}')" = "b2bfd35c8672c6238e7ab488c99c3483b9f342b0"
          test "$(git ls-tree -r --name-only refs/remotes/release/main | wc -l)" -eq 138
          git ls-tree -r --name-only refs/remotes/release/main | grep -qx README.md
          git ls-tree -r --name-only refs/remotes/release/main | grep -qx pyproject.toml

      - name: Publish validated import branch and tag
        shell: bash
        run: |
          set -euo pipefail
          git push origin refs/remotes/release/main:refs/heads/release-import
          git push origin refs/tags/v1.0.0:refs/tags/v1.0.0
